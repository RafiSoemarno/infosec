services:
  app:
    build:
      context: ./docker/app
    container_name: laravel-app
    working_dir: /var/www/html
    environment:
      # Tailscale
      TS_AUTHKEY: "tskey-auth-k4QcZfMtSU11CNTRL-nyeXrwhmHwEfw6YHjTArvEBWRNYbkjKS"
      TS_HOSTNAME: "laravel-dev"
      TS_ACCEPT_ROUTES: "false"

      # Laravel typical env defaults (you can also use app/.env)
      APP_ENV: local
      APP_DEBUG: "true"

      DB_CONNECTION: mysql
      DB_HOST: mariadb
      DB_PORT: 3307
      DB_DATABASE: app
      DB_USERNAME: app
      DB_PASSWORD: app

    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../app:/var/www/html:cached
      - ./storage/app:/var/www/html/storage/app
      - ./storage/logs:/var/www/html/storage/logs
      - ./storage/framework:/var/www/html/storage/framework
      - tailscale-state:/var/lib/tailscale
    depends_on:
      - mariadb

  nginx:
    image: nginx:1.27-alpine
    container_name: laravel-nginx
    ports:
      - "8085:80"   # public to your host at http://localhost:8080
    volumes:
      - ../app:/var/www/html:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  mariadb:
    image: mariadb:11.4
    container_name: laravel-mariadb
    environment:
      MARIADB_DATABASE: app
      MARIADB_USER: app
      MARIADB_PASSWORD: app
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3307:3306" # so the HOST can access MariaDB too
    volumes:
      - mariadb-data:/var/lib/mysql

  adminer:
    image: adminer:4
    container_name: laravel-adminer
    ports:
      - "8081:8080"
    depends_on:
      - mariadb

volumes:
  mariadb-data:
  tailscale-state: